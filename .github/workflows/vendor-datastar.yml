name: Vendor datastar

on:
  workflow_dispatch:

jobs:
  vendor-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            substituters = https://cache.nixos.org https://nix-community.cachix.org

      - name: Build datastar
        run: |
          BUILD_PATH=$(nix build .#datastar --print-out-paths)
          mkdir -p crabstar/vendor
          cp -f "$BUILD_PATH/datastar.js" crabstar/vendor

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update datastar vendor files"
          title: "Update datastar vendor files"
          body: |
            Automated update of datastar vendor files.

            - Built from latest datastar source
            - Updated: `crabstar/vendor/datastar.js`
          branch: datastar-vendor-update
          delete-branch: true
