[workspace]
members = ["crabstar", "crabstar_macros"]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
askama = { version = "0.14" }
toml = "0.9"
axum = { version = "0.8", default-features = false }
trybuild = { version = "1.0", features = ["diff"] }
syn = { version = "2" }
quote = { version = "1", default-features = false }
proc-macro2 = { version = "1", default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tokio-stream = { version = "0.1.17" }
futures = { version = "0.3" }
tower-livereload = { version = "0.9" }
tower-http = { version = "0.6", features = ["compression-full"] }
lightningcss = { version = "1.0.0-alpha.67" }
base64.version = "0.22"

crabstar = { path = "./crabstar" }
crabstar_macros = { path = "./crabstar_macros" }
