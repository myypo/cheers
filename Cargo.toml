[workspace]
members = ["crabstar", "crabstar_macros", "typed_jinja", "typed_jinja_macros"]
resolver = "3"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
askama = { version = "0.14" }
minijinja = { version = "2", features = ["loader"] }
minijinja-autoreload = { version = "2" }
toml = "0.9"

trybuild = { version = "1.0", features = ["diff"] }

syn = { version = "2" }
quote = { version = "1", default-features = false }
proc-macro2 = { version = "1", default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
futures = { version = "0.3" }

crabstar = { path = "./crabstar" }
crabstar_macros = { path = "./crabstar_macros" }
typed_jinja = { path = "./typed_jinja" }
typed_jinja_macros = { path = "./typed_jinja_macros" }
