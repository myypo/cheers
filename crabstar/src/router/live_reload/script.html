<script>
(function() {
  let attempts = 0;

  function connect() {
    const source = new EventSource("/crabstar-dev/live-reload");

    source.onopen = function() {
      if (attempts !== 0) {
          window.location.reload();
      }
      console.log("Crabstar live-reload connected");
      attempts = 0;
    };

    source.onmessage = function(event) {
      if (event.data === "reload") {
        console.log("Crabstar reload event received, reloading page...");
        window.location.reload();
      }
    };

    source.onerror = function(err) {
      console.error("Crabstar live-reload connection error:", err);
      if (attempts >= 30) {
        window.location.reload();
      }

      const delay = Math.min(50 * Math.pow(1.25, attempts), 1000);
      source.close();
      attempts++;
      setTimeout(() => {
        connect();
      }, delay);
    };
  }

  connect();
})();
</script>
