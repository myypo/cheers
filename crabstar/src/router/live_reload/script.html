<script>
(function() {
  let source = null;
  let reconnectAttempts = 0;
  let maxReconnectAttempts = 5;
  let reconnectDelay = 1000; 
  let maxReconnectDelay = 30000; 
  let isPageVisible = !document.hidden;
  let reconnectTimer = null;
  
  function getReconnectDelay() {
    return Math.min(reconnectDelay * Math.pow(2, reconnectAttempts), maxReconnectDelay);
  }

  function connect() {
    if (source && source.readyState !== EventSource.CLOSED) {
      return; 
    }

    source = new EventSource("/crabstar-dev/live-reload");

    source.onopen = function() {
      console.log("Crabstar live-reload connected");
      reconnectAttempts = 0; 
      reconnectDelay = 1000;
    };

    source.onmessage = function(event) {
      if (event.data === "reload") {
        console.log("Crabstar reload event received, reloading page...");
        cleanup(); 
        window.location.reload();
      }
    };

    source.onerror = function(err) {
      console.error("Crabstar live-reload connection error:", err);
      
      if (source.readyState === EventSource.CLOSED) {
        scheduleReconnect();
      }
    };
  }

  function scheduleReconnect() {
    if (reconnectAttempts >= maxReconnectAttempts) {
      console.warn("Crabstar live-reload: Max reconnection attempts reached");
      return;
    }

    if (!isPageVisible) {
      console.log("Crabstar live-reload: Page not visible, skipping reconnect");
      return;
    }

    const delay = getReconnectDelay();
    console.log(`Crabstar live-reload: Reconnecting in ${delay}ms (attempt ${reconnectAttempts + 1})`);
    
    reconnectTimer = setTimeout(() => {
      reconnectAttempts++;
      connect();
    }, delay);
  }

  function cleanup() {
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    
    if (source) {
      source.close();
      source = null;
    }
  }
  
  document.addEventListener('visibilitychange', function() {
    isPageVisible = !document.hidden;
    
    if (isPageVisible) {
      if (!source || source.readyState === EventSource.CLOSED) {
        console.log("Crabstar live-reload: Page visible, reconnecting...");
        reconnectAttempts = 0; 
        connect();
      }
    } else {
      console.log("Crabstar live-reload: Page hidden, cleaning up connection");
      cleanup();
    }
  });

  window.addEventListener('beforeunload', cleanup);
  window.addEventListener('pagehide', cleanup);
  
  connect();
  
  window.crabstarLiveReload = {
    cleanup: cleanup,
    reconnect: function() {
      cleanup();
      reconnectAttempts = 0;
      connect();
    },
    status: function() {
      return {
        connected: source && source.readyState === EventSource.OPEN,
        readyState: source ? source.readyState : 'disconnected',
        reconnectAttempts: reconnectAttempts,
        isPageVisible: isPageVisible
      };
    }
  };
})();
</script>
